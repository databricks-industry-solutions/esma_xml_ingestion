name: Databricks Asset Bundles CI

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - prod

jobs:
  validate-and-deploy:
    runs-on: html_publisher

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Configure Databricks CLI authentication
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = ${{ secrets.DATABRICKS_HOST }}" >> ~/.databrickscfg
          echo "token = ${{ secrets.DATABRICKS_TOKEN }}" >> ~/.databrickscfg

      - name: Set environment variables
        run: |
          echo "DEPLOY_ENV=${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_ENV

      - name: Validate bundle configuration
        run: |
          echo "Validating Databricks Asset Bundle for ${{ env.DEPLOY_ENV }} environment..."
          databricks bundle validate --target ${{ env.DEPLOY_ENV }}

      - name: Deploy bundle
        run: |
          echo "Deploying to ${{ env.DEPLOY_ENV }} environment..."
          databricks bundle deploy --target ${{ env.DEPLOY_ENV }}

      - name: Run jobs (optional)
        if: github.event.inputs.environment == 'dev'
        run: |
          echo "Running test jobs in development environment..."
          # Uncomment to run specific resources:
          # databricks bundle run EMIR_Schema_Creation --target dev
          # databricks bundle run emir_pipeline --target dev   # bronze + silver in one
          # databricks bundle run mifir_pipeline --target dev
