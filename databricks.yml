bundle:
  name: esma_xml_ingestion

include:
  - resources/**/*.yml
  - resources/*.yml
  - resources/config/local/*.yml

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: "esma_dev"
    resources:
      pipelines:
        emir_xml_loader_pipeline:
          development: true
        emir_xml_loader_pipeline_wholefile:
          development: true
        mifir_xml_loader_pipeline:
          development: true

  prod:
    mode: production
    variables:
      catalog: "esma_prod"
    resources:
      pipelines:
        emir_xml_loader_pipeline:
          development: false
        emir_xml_loader_pipeline_wholefile:
          development: false
        mifir_xml_loader_pipeline:
          development: false
