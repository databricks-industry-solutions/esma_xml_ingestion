# EMIR (European Market Infrastructure Regulation) Job Definitions

resources:

  # === Classic Notebook Jobs ===
  jobs:
    EMIR_XML_Processing:
      name: "EMIR XML Processing"
      max_concurrent_runs: ${var.emir_max_concurrent_runs}

      tasks:
        - task_key: emir_xml_flatten
          notebook_task:
            notebook_path: ../src/notebooks/2_flatten_explode_table.py
            source: WORKSPACE
            
      queue:
        enabled: true
        
      parameters:
        - name: table_prefix
          default: "${var.emir_table_prefix}"
        - name: catalog
          default: "${var.emir_catalog}"
        - name: raw_schema
          default: "${var.emir_raw_schema}"
        - name: bronze_schema
          default: "${var.emir_bronze_schema}"
        - name: checkpoint_path
          default: "${var.emir_checkpoint_path}"
        - name: landing_path
          default: "${var.emir_landing_path}"
        - name: processed_path
          default: "${var.emir_processed_path}"
        - name: row_tag
          default: "${var.emir_row_tag}"
        - name: xml_schema_hdr_pyld_metadata_path
          default: "${var.emir_xml_schema_hdr_pyld_metadata_path}"
        - name: xml_schema_pyld_path
          default: "${var.emir_xml_schema_pyld_path}"
        - name: xml_xsd_schema_pyld_path
          default: "${var.emir_xml_xsd_schema_pyld_path}"

    EMIR_Schema_Creation:
      name: "EMIR Schema Creation"
      max_concurrent_runs: ${var.emir_schema_max_concurrent_runs}
      
      tasks:
        - task_key: emir_schema_generation
          notebook_task:
            notebook_path: ../src/notebooks/0_1_xml_schema_xsd.py
            source: WORKSPACE
            
      queue:
        enabled: true
        
      parameters:
        - name: schemas_path
          default: "${var.emir_schemas_path}"
        - name: master_xsd_path
          default: "${var.emir_master_xsd_path}"
        - name: payload_xsd_path
          default: "${var.emir_payload_xsd_path}"
        - name: row_tag
          default: "${var.emir_row_tag}"
        - name: schema_mappings_json
          default: "${var.emir_schema_mappings_json}"

  # === Spark Declarative Pipelines ===
  pipelines:
    emir_xml_loader_pipeline:
      name: "EMIR XML Loader (SDP)"
      catalog: ${var.emir_catalog}
      schema: ${var.emir_raw_schema}
      serverless: true
      channel: PREVIEW
      development: false
      photon: true
      continuous: false

      libraries:
        - file:
            path: ../src/pipelines/xml_loader.py

      environment:
        dependencies:
          - lxml==5.3.0

      configuration:
        catalog: ${var.emir_catalog}
        raw_schema: ${var.emir_raw_schema}
        table_prefix: ${var.emir_table_prefix}
        landing_path: ${var.emir_landing_path}
        row_tag: ${var.emir_row_tag}
        xml_schema_pyld_path: ${var.emir_xml_schema_pyld_path}
        xml_schema_hdr_pyld_metadata_path: ${var.emir_xml_schema_hdr_pyld_metadata_path}
        xml_xsd_schema_pyld_path: ${var.emir_xml_xsd_schema_pyld_path}
        enable_xsd_validation: ${var.emir_enable_xsd_validation}
        enable_filename_regex: ${var.emir_enable_filename_regex}
        clean_source_mode: ${var.emir_clean_source_mode}
        clean_source_move_destination: ${var.emir_processed_path}
        clean_source_retention: ${var.emir_clean_source_retention}

    emir_silver_pipeline:
      name: "EMIR Silver (domain-driven)"
      catalog: ${var.emir_catalog}
      schema: ${var.emir_raw_schema}
      serverless: true
      channel: PREVIEW
      development: false
      photon: true
      continuous: false

      libraries:
        - file:
            path: ../src/pipelines/silver_emir.py

      configuration:
        catalog: ${var.emir_catalog}
        raw_schema: ${var.emir_raw_schema}
        silver_schema: ${var.emir_raw_schema}
        bronze_table: ${var.emir_table_prefix}_raw
        regulation: "EMIR"
