# MiFIR (Markets in Financial Instruments Regulation) Job + Pipeline Definitions

resources:

  # === Schema Prep Job (one-time XSD -> JSON for the SDP loader) ===
  jobs:
    MiFIR_Schema_Creation:
      name: "MiFIR Schema Creation"
      max_concurrent_runs: ${var.mifir_schema_max_concurrent_runs}
      
      tasks:
        - task_key: mifir_schema_generation
          notebook_task:
            notebook_path: ../src/notebooks/0_1_xml_schema_xsd.py
            source: WORKSPACE
            
      queue:
        enabled: true
        
      parameters:
        - name: schemas_path
          default: "${var.mifir_schemas_path}"
        - name: master_xsd_path
          default: "${var.mifir_master_xsd_path}"
        - name: payload_xsd_path
          default: "${var.mifir_payload_xsd_path}"
        - name: row_tag
          default: "${var.mifir_row_tag}"
        - name: schema_mappings_json
          default: "${var.mifir_schema_mappings_json}"

  # === Spark Declarative Pipelines ===
  pipelines:
    mifir_xml_loader_pipeline:
      name: "MiFIR XML Loader (SDP)"
      catalog: ${var.mifir_catalog}
      schema: ${var.mifir_raw_schema}
      serverless: true
      channel: CURRENT
      development: false
      photon: true
      continuous: false

      libraries:
        - file:
            path: ../src/pipelines/xml_loader.py

      environment:
        dependencies:
          - lxml==5.3.0

      configuration:
        catalog: ${var.mifir_catalog}
        raw_schema: ${var.mifir_raw_schema}
        table_prefix: ${var.mifir_table_prefix}
        landing_path: ${var.mifir_landing_path}
        row_tag: ${var.mifir_row_tag}
        xml_schema_pyld_path: ${var.mifir_xml_schema_pyld_path}
        xml_schema_hdr_pyld_metadata_path: ${var.mifir_xml_schema_hdr_pyld_metadata_path}
        xml_xsd_schema_pyld_path: ${var.mifir_xml_xsd_schema_pyld_path}
        enable_xsd_validation: ${var.mifir_enable_xsd_validation}
        enable_filename_regex: ${var.mifir_enable_filename_regex}
        clean_source_mode: ${var.mifir_clean_source_mode}
        clean_source_move_destination: ${var.mifir_processed_path}
        clean_source_retention: ${var.mifir_clean_source_retention}

    mifir_silver_pipeline:
      name: "MiFIR Silver (domain-driven)"
      catalog: ${var.mifir_catalog}
      schema: ${var.mifir_raw_schema}
      serverless: true
      channel: CURRENT
      development: false
      photon: true
      continuous: false

      libraries:
        - file:
            path: ../src/pipelines/silver_mifir.py

      configuration:
        catalog: ${var.mifir_catalog}
        raw_schema: ${var.mifir_raw_schema}
        silver_schema: ${var.mifir_raw_schema}
        bronze_table: ${var.mifir_table_prefix}_raw
        regulation: "MIFIR"
        enable_filename_regex: "true"
