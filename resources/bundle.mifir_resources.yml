# MiFIR (Markets in Financial Instruments Regulation) Job Definitions

resources:

  # === Classic Notebook Jobs ===
  jobs:
    MiFIR_XML_Processing:
      name: "MiFIR XML Processing"
      max_concurrent_runs: ${var.mifir_max_concurrent_runs}

      tasks:
        - task_key: mifir_xml_flatten
          notebook_task:
            notebook_path: ../src/notebooks/2_flatten_explode_table.py
            source: WORKSPACE
            
      queue:
        enabled: true
        
      parameters:
        - name: table_prefix
          default: "${var.mifir_table_prefix}"
        - name: catalog
          default: "${var.mifir_catalog}"
        - name: raw_schema
          default: "${var.mifir_raw_schema}"
        - name: bronze_schema
          default: "${var.mifir_bronze_schema}"
        - name: checkpoint_path
          default: "${var.mifir_checkpoint_path}"
        - name: landing_path
          default: "${var.mifir_landing_path}"
        - name: processed_path
          default: "${var.mifir_processed_path}"
        - name: row_tag
          default: "${var.mifir_row_tag}"
        - name: xml_schema_hdr_pyld_metadata_path
          default: "${var.mifir_xml_schema_hdr_pyld_metadata_path}"
        - name: xml_schema_pyld_path
          default: "${var.mifir_xml_schema_pyld_path}"
        - name: xml_xsd_schema_pyld_path
          default: "${var.mifir_xml_xsd_schema_pyld_path}"

    MiFIR_Schema_Creation:
      name: "MiFIR Schema Creation"
      max_concurrent_runs: ${var.mifir_schema_max_concurrent_runs}
      
      tasks:
        - task_key: mifir_schema_generation
          notebook_task:
            notebook_path: ../src/notebooks/0_1_xml_schema_xsd.py
            source: WORKSPACE
            
      queue:
        enabled: true
        
      parameters:
        - name: schemas_path
          default: "${var.mifir_schemas_path}"
        - name: master_xsd_path
          default: "${var.mifir_master_xsd_path}"
        - name: payload_xsd_path
          default: "${var.mifir_payload_xsd_path}"
        - name: row_tag
          default: "${var.mifir_row_tag}"
        - name: schema_mappings_json
          default: "${var.mifir_schema_mappings_json}"

  # === Spark Declarative Pipelines ===
  pipelines:
    mifir_xml_loader_pipeline:
      name: "MiFIR XML Loader (SDP)"
      catalog: ${var.mifir_catalog}
      schema: ${var.mifir_raw_schema}
      serverless: true
      channel: PREVIEW
      development: false
      photon: true
      continuous: false

      libraries:
        - file:
            path: ../src/pipelines/xml_loader.py

      environment:
        dependencies:
          - lxml==5.3.0

      configuration:
        catalog: ${var.mifir_catalog}
        raw_schema: ${var.mifir_raw_schema}
        table_prefix: ${var.mifir_table_prefix}
        landing_path: ${var.mifir_landing_path}
        row_tag: ${var.mifir_row_tag}
        xml_schema_pyld_path: ${var.mifir_xml_schema_pyld_path}
        xml_schema_hdr_pyld_metadata_path: ${var.mifir_xml_schema_hdr_pyld_metadata_path}
        xml_xsd_schema_pyld_path: ${var.mifir_xml_xsd_schema_pyld_path}
        watermark_interval: "15 minutes"
