# Development Variables (Local Configuration)
# This file is git-ignored for local development

variables:
  
  catalog:
    description: "Target catalog - set per environment"
    default: "esma"
    
  volume_path:
    default: "/Volumes/${var.catalog}/default/regulatory_data"

  # Removed schema_spark_version and schema_node_type - now using serverless compute
    
  emir_max_concurrent_runs:
    default: 10
    
  emir_table_prefix:
    default: "emir"
    
  emir_catalog:
    default: "${var.catalog}"
    
  emir_raw_schema:
    default: "emir_raw"
    
  emir_bronze_schema:
    default: "emir_bronze"
    
  emir_volume_path:
    default: "${var.volume_path}"
    
  emir_landing_path:
    default: "${var.volume_path}/emir/landing/"
    
  emir_checkpoint_path:
    default: "${var.volume_path}/emir/checkpoints/"
    
  emir_processed_path:
    default: "${var.volume_path}/emir/processed/"
    
  emir_row_tag:
    default: "Stat"
    
  emir_xml_schema_hdr_pyld_metadata_path:
    default: "${var.volume_path}/emir/schemas/hdr_pyld_metadata_schema.json"
    
  emir_xml_schema_pyld_path:
    default: "${var.volume_path}/emir/schemas/pyld_schema.json"
    
  emir_xml_xsd_schema_pyld_path:
    default: "${var.volume_path}/emir/schemas/row_tag_schema.xsd"

  emir_enable_xsd_validation:
    description: "Whether to enforce Auto Loader rowValidationXSDPath on EMIR XML. 'true' (default) or 'false' to bypass."
    default: "true"

  emir_enable_filename_regex:
    description: "Whether to extract FileBatchIndex/FileBatchSize/FileVersion/ESMADate from EMIR XML filenames via the ESMA naming-convention regex. 'true' (default) or 'false' to skip (columns emit NULL)."
    default: "true"

  emir_clean_source_mode:
    description: "Auto Loader cloudFiles.cleanSource mode for EMIR landing files: 'OFF' (default-safe), 'MOVE' (archive to emir_processed_path), or 'DELETE'. MOVE recommended for production."
    default: "MOVE"

  emir_clean_source_retention:
    description: "cloudFiles.cleanSource.retentionDuration — waiting period after a file is processed before it becomes eligible for archival/deletion. Must exceed the worst-case lag between the bronze raw_xml_payload commit and the downstream raw() LXML re-read. CalendarInterval string (e.g. '7 days', '1 day', '12 hours')."
    default: "7 days"

  # EMIR Schema Creation Job Variables
  emir_schema_max_concurrent_runs:
    default: 1
    
  emir_schemas_path:
    default: "${var.volume_path}/emir/schemas/"
    
  emir_master_xsd_path:
    default: "${var.volume_path}/emir/schemas/1 Header 003.xsd"
    
  emir_payload_xsd_path:
    default: "${var.volume_path}/emir/schemas/EMIR_Refit-_Outgoing_auth_107_001_01_ESMAUG_DATTSR_1_1_0.xsd"
    
  emir_schema_mappings_json:
    default: '[{"field": "Hdr", "file_path": "/Volumes/${var.catalog}/default/regulatory_data/emir/schemas/2 BusinessApplicationHeader 001.xsd"}, {"field": "Pyld", "file_path": "/Volumes/${var.catalog}/default/regulatory_data/emir/schemas/EMIR_Refit-_Outgoing_auth_107_001_01_ESMAUG_DATTSR_1_1_0.xsd", "payload": true}]'

  # MiFIR Job Variables
  mifir_max_concurrent_runs:
    default: 10
    
  mifir_table_prefix:
    default: "mifir"
    
  mifir_catalog:
    default: "${var.catalog}"
    
  mifir_raw_schema:
    default: "mifir_raw"
    
  mifir_bronze_schema:
    default: "mifir_bronze"
    
  mifir_volume_path:
    default: "${var.volume_path}"
    
  mifir_landing_path:
    default: "${var.volume_path}/mifir/landing/"
    
  mifir_checkpoint_path:
    default: "${var.volume_path}/mifir/checkpoints/"
    
  mifir_processed_path:
    default: "${var.volume_path}/mifir/processed/"
    
  mifir_row_tag:
    default: "Tx"
    
  mifir_xml_schema_hdr_pyld_metadata_path:
    default: "${var.volume_path}/mifir/schemas/hdr_pyld_metadata_schema.json"
    
  mifir_xml_schema_pyld_path:
    default: "${var.volume_path}/mifir/schemas/pyld_schema.json"
    
  mifir_xml_xsd_schema_pyld_path:
    default: "${var.volume_path}/mifir/schemas/row_tag_schema.xsd"

  mifir_enable_xsd_validation:
    description: "Whether to enforce Auto Loader rowValidationXSDPath on MiFIR XML. 'true' (default) or 'false' to bypass."
    default: "true"

  mifir_enable_filename_regex:
    description: "Whether to extract FileBatchIndex/FileBatchSize/FileVersion/ESMADate from MiFIR XML filenames via the ESMA naming-convention regex. 'true' (default) or 'false' to skip (columns emit NULL)."
    default: "true"

  mifir_clean_source_mode:
    description: "Auto Loader cloudFiles.cleanSource mode for MiFIR landing files: 'OFF' (default-safe), 'MOVE' (archive to mifir_processed_path), or 'DELETE'. MOVE recommended for production."
    default: "MOVE"

  mifir_clean_source_retention:
    description: "cloudFiles.cleanSource.retentionDuration — waiting period after a file is processed before it becomes eligible for archival/deletion. Must exceed the worst-case lag between the bronze raw_xml_payload commit and the downstream raw() LXML re-read. CalendarInterval string (e.g. '7 days', '1 day', '12 hours')."
    default: "7 days"

  # MiFIR Schema Creation Job Variables
  mifir_schema_max_concurrent_runs:
    default: 1
    
  mifir_schemas_path:
    default: "${var.volume_path}/mifir/schemas/"
    
  mifir_master_xsd_path:
    default: "${var.volume_path}/mifir/schemas/Files_Wrapper_unavista_mifir_iso20022_001_001_001_vol.xsd"
    
  mifir_payload_xsd_path:
    default: "${var.volume_path}/mifir/schemas/PayloadDocument_auth_016_001_01_ESMAUG_Reporting_1_1_0.xsd"
    
  mifir_schema_mappings_json:
    default: '[{"field": "UVHeader", "file_path": "/Volumes/${var.catalog}/default/regulatory_data/mifir/schemas/Files_unavista_header_001_001_001.xsd"}, {"field": "BizAppHeader", "file_path": "/Volumes/${var.catalog}/default/regulatory_data/mifir/schemas/Files_BizAppheader_001_001_01.xsd"}, {"field": "Document", "file_path": "/Volumes/${var.catalog}/default/regulatory_data/mifir/schemas/PayloadDocument_auth_016_001_01_ESMAUG_Reporting_1_1_0.xsd", "payload": true}]' 